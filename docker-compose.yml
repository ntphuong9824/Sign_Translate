version: '3.8'

services:
  db:
    image: postgres:15
    container_name: signlanguage-db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d signlanguage"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: signlanguage
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signlanguage-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/signlanguage
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CREDENTIALS_PATH: /app/config/firebase-service-account.json
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signlanguage-frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  postgres_data: